<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeCity Pro - Control de Mando v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); }
        #map { height: 100%; width: 100%; background-color: #0b0f1a; }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 font-sans h-screen flex flex-col overflow-hidden">

    <header class="h-16 md:h-20 border-b border-slate-800 glass-panel px-4 md:px-6 flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 md:w-10 md:h-10 bg-cyan-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(8,145,178,0.4)] border border-cyan-400/30">
                <span class="text-white font-black text-xl md:text-2xl tracking-tighter">S</span>
            </div>
            <div>
                <h1 class="text-sm md:text-lg font-bold tracking-tight text-white uppercase">SafeCity <span class="text-cyan-400 text-[10px] ml-1">PRO</span></h1>
                <p class="text-[7px] md:text-[9px] text-slate-500 uppercase tracking-widest font-bold">Monitor ZMG</p>
            </div>
        </div>

        <div class="hidden lg:flex gap-8">
            <div class="text-center">
                <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Alertas Totales</p>
                <p id="stat-total" class="text-xl font-mono text-white leading-none">00</p>
            </div>
            <div class="text-center border-x border-slate-800 px-8">
                <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Más Frecuente</p>
                <p id="stat-common" class="text-xl font-mono text-cyan-400 leading-none">--</p>
            </div>
        </div>

        <div class="text-cyan-500 text-[10px] md:text-xs font-mono bg-slate-900/50 px-3 py-1.5 rounded-lg border border-slate-800" id="clock">--:--:--</div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <section class="flex-[1.2] md:flex-1 relative order-first md:order-last border-b md:border-b-0 border-slate-800">
            <div id="map"></div>
            <button onclick="miUbicacion()" class="absolute bottom-4 right-4 md:bottom-10 md:right-10 z-50 bg-slate-900/90 border border-slate-700 p-3 md:p-4 rounded-full text-cyan-400 shadow-2xl active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </section>

        <aside class="flex-1 md:w-80 md:flex-none border-r border-slate-800 flex flex-col glass-panel shadow-2xl z-40 overflow-hidden">
            
            <div class="p-4 md:p-6 border-b border-slate-800/50 bg-slate-900/20">
                <div class="flex flex-col gap-3">
                    <div class="flex gap-2">
                        <select id="tipo" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs outline-none focus:border-cyan-500 text-slate-300">
                            <option value="Robo">🚨 Robo</option>
                            <option value="Accidente">🚑 Vial</option>
                            <option value="Vandalismo">🎨 Vandalismo</option>
                            <option value="Incendio">🔥 Incendio</option>
                        </select>
                        <button onclick="enviarAlerta()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-4 rounded-lg text-[10px] font-black uppercase transition-all active:scale-95 shadow-lg shadow-cyan-900/20">
                            Enviar
                        </button>
                    </div>
                    <input id="ubicacion" type="text" placeholder="Ubicación (ej. CUCEI)" 
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs outline-none focus:border-cyan-500 text-white placeholder:text-slate-600">
                </div>
            </div>

            <div class="px-4 py-2 border-b border-slate-800/50 flex gap-2 overflow-x-auto no-scrollbar bg-slate-900/10">
                <button onclick="filtrarHistorial('todos')" class="filter-btn text-[8px] font-bold px-3 py-1.5 rounded-full border border-cyan-500/50 bg-cyan-500/10 text-cyan-400 whitespace-nowrap">TODOS</button>
                <button onclick="filtrarHistorial('Robo')" class="filter-btn text-[8px] font-bold px-3 py-1.5 rounded-full border border-slate-700 bg-slate-900 text-slate-500 whitespace-nowrap">ROBOS</button>
                <button onclick="filtrarHistorial('Accidente')" class="filter-btn text-[8px] font-bold px-3 py-1.5 rounded-full border border-slate-700 bg-slate-900 text-slate-500 whitespace-nowrap">VIALES</button>
            </div>

            <div id="incident-feed" class="flex-1 p-4 overflow-y-auto space-y-3 bg-[#0b0f1a]/50">
                </div>
        </aside>

    </main>

    <div id="toast-container" class="fixed bottom-4 left-4 right-4 md:right-auto md:bottom-6 md:left-6 z-[100] space-y-2"></div>

    <script>
        const API_BACKEND = 'https://basically-hangup-pastel.ngrok-free.dev/alerts';
        let map, infoWindow, markers = [], todasLasAlertas = [];

        const darkStyle = [
            { "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] },
            { "elementType": "labels.text.fill", "stylers": [{ "color": "#94a3b8" }] },
            { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#334155" }] },
            { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#020617" }] }
        ];

        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString();
        }, 1000);

        function showToast(mensaje, tipo = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `glass-panel border-l-4 ${tipo === 'success' ? 'border-cyan-500 text-cyan-400' : 'border-red-500 text-red-400'} p-3 rounded-lg shadow-2xl transition-all duration-500 translate-y-10 opacity-0 text-[9px] font-black uppercase tracking-widest flex items-center gap-3`;
            toast.innerHTML = `<div class="h-2 w-2 rounded-full ${tipo === 'success' ? 'bg-cyan-500' : 'bg-red-500'} animate-ping"></div>${mensaje}`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-10', 'opacity-0'); }, 100);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                setTimeout(() => toast.remove(), 500);
            }, 3500);
        }

        async function initMap() {
            const { Map, InfoWindow } = await google.maps.importLibrary("maps");
            infoWindow = new InfoWindow();
            map = new Map(document.getElementById("map"), {
                center: { lat: 20.6644, lng: -103.3248 },
                zoom: 13,
                styles: darkStyle,
                disableDefaultUI: true,
                mapId: "90f87356969d889c"
            });
            cargarHistorial();
        }

        function miUbicacion() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    const pos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    map.setZoom(16);
                    map.panTo(pos);
                    showToast("GPS: POSICIÓN ACTUALIZADA");
                }, () => showToast("ERROR: GPS INACCESIBLE", "error"));
            }
        }

        function filtrarHistorial(tipo) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn text-[8px] font-bold px-3 py-1.5 rounded-full border border-slate-700 bg-slate-900 text-slate-500 whitespace-nowrap";
            });
            event.target.className = "filter-btn active text-[8px] font-bold px-3 py-1.5 rounded-full border border-cyan-500/50 bg-cyan-500/10 text-cyan-400 whitespace-nowrap";
            
            const filtradas = tipo === 'todos' ? todasLasAlertas : todasLasAlertas.filter(a => a.tipo === tipo);
            renderizarFeed(filtradas);
        }

        async function cargarHistorial() {
            const feed = document.getElementById('incident-feed');
            feed.innerHTML = [1,2,3].map(() => `<div class="skeleton h-20 w-full rounded-xl border border-slate-800/50"></div>`).join('');

            try {
                const res = await fetch(API_BACKEND, { headers: { "ngrok-skip-browser-warning": "true" } });
                todasLasAlertas = await res.json();
                
                const statTotal = document.getElementById('stat-total');
                if(statTotal) statTotal.innerText = todasLasAlertas.length.toString().padStart(2, '0');
                
                renderizarFeed(todasLasAlertas);
            } catch (e) { showToast("SIN CONEXIÓN AL BACKEND", "error"); }
        }

        async function renderizarFeed(alertas) {
            const feed = document.getElementById('incident-feed');
            feed.innerHTML = "";
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
            
            markers.forEach(m => m.map = null);
            markers = [];

            alertas.forEach(a => {
                const marker = new AdvancedMarkerElement({
                    map: map,
                    position: { lat: parseFloat(a.lat), lng: parseFloat(a.lon) },
                    title: a.tipo
                });
                markers.push(marker);

                marker.addListener("gmp-click", () => {
                    infoWindow.setContent(`<div class="p-2 text-slate-800 text-[10px] font-bold uppercase">${a.tipo}<br>${a.ubicacion}</div>`);
                    infoWindow.open(map, marker);
                });

                const item = document.createElement('div');
                item.className = "group bg-slate-900/40 border-l-4 border-cyan-500/30 p-3 rounded-r-lg transition-all hover:bg-slate-800 hover:border-cyan-400 cursor-pointer border border-slate-800/50";
                item.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[9px] font-black text-cyan-400 uppercase">${a.tipo}</span>
                        <span class="text-[8px] font-mono text-slate-600">${a.fecha || ''}</span>
                    </div>
                    <p class="text-[10px] text-slate-400 leading-tight">${a.ubicacion}</p>
                `;
                item.onclick = () => {
                    map.panTo({ lat: parseFloat(a.lat), lng: parseFloat(a.lon) });
                    map.setZoom(15);
                };
                feed.appendChild(item);
            });
        }

        async function enviarAlerta() {
            const tipo = document.getElementById('tipo').value;
            const ubicacion = document.getElementById('ubicacion').value;
            if (!ubicacion) return showToast("UBICACIÓN REQUERIDA", "error");

            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ address: ubicacion + ", Guadalajara" }, async (results, status) => {
                if (status === "OK") {
                    const lat = results[0].geometry.location.lat();
                    const lon = results[0].geometry.location.lng();
                    try {
                        const response = await fetch(API_BACKEND, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'ngrok-skip-browser-warning': 'true'
                            },
                            body: JSON.stringify({ tipo, ubicacion, lat, lon })
                        });
                        if (response.ok) {
                            showToast("ALERTA TRANSMITIDA");
                            document.getElementById('ubicacion').value = "";
                            cargarHistorial();
                        }
                    } catch (e) { showToast("ERROR DE SERVIDOR", "error"); }
                } else showToast("LUGAR NO ENCONTRADO", "error");
            });
        }
    </script>
    <script>
        const MAPS_CONFIG = { key: "AIzaSyCIEFQof0In0Gh8nT60zZt6p2jBrM1fHOs" };
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_CONFIG.key}&callback=initMap&libraries=marker,geocoding`;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
    </script>
</body>
</html>
