<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCity Pro - Control de Mando v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        #map { height: 100%; width: 100%; background-color: #0b0f1a; }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        section.flex-1::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 120px rgba(11, 15, 26, 0.8);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 font-sans h-screen flex flex-col overflow-hidden">

    <header class="h-20 border-b border-slate-800 glass-panel px-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-cyan-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(8,145,178,0.5)] border border-cyan-400/30">
                <span class="text-white font-black text-2xl tracking-tighter">S</span>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-white uppercase">SafeCity <span class="text-cyan-400 text-xs ml-1">v3.0</span></h1>
                <p class="text-[9px] text-slate-500 uppercase tracking-[0.2em] font-bold">Monitor de Seguridad ZMG</p>
            </div>
        </div>

        <div class="hidden md:flex gap-8">
            <div class="text-center">
                <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Alertas Totales</p>
                <p id="stat-total" class="text-xl font-mono text-white leading-none">00</p>
            </div>
            <div class="text-center border-x border-slate-800 px-8">
                <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Más frecuente</p>
                <p id="stat-common" class="text-xl font-mono text-cyan-400 leading-none">--</p>
            </div>
            <div class="text-center">
                <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Estado Red</p>
                <p class="text-xl font-mono text-emerald-500 leading-none flex items-center gap-2">
                    ONLINE <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                </p>
            </div>
        </div>

        <div class="text-cyan-500 text-xs font-mono tracking-widest bg-slate-900/50 px-4 py-2 rounded-lg border border-slate-800" id="clock">--:--:--</div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 border-r border-slate-800 flex flex-col glass-panel shadow-2xl z-40">
            <div class="p-6 border-b border-slate-800/50">
                <h2 class="text-[10px] font-black text-cyan-500 uppercase tracking-widest mb-5 flex items-center gap-2">
                    <span class="w-1 h-3 bg-cyan-500 rounded-full"></span> Nueva Transmisión
                </h2>
                <div class="space-y-4">
                    <select id="tipo" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg p-3 text-sm outline-none focus:border-cyan-500 text-slate-300">
                        <option value="Robo">🚨 Robo / Asalto</option>
                        <option value="Accidente">🚑 Accidente Vial</option>
                        <option value="Vandalismo">🎨 Vandalismo</option>
                        <option value="Incendio">🔥 Incendio</option>
                    </select>
                    <input id="ubicacion" type="text" placeholder="Ej. CUCEI, Guadalajara" 
                           class="w-full bg-slate-900/80 border border-slate-700 rounded-lg p-3 text-sm outline-none focus:border-cyan-500 placeholder:text-slate-600 text-white">
                    <button onclick="enviarAlerta()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-3 rounded-lg text-xs font-black uppercase tracking-widest transition-all transform active:scale-95 shadow-lg">
                        Transmitir Alerta
                    </button>
                </div>
            </div>

            <div class="px-6 py-4 border-b border-slate-800/50 flex gap-2 overflow-x-auto no-scrollbar">
                <button onclick="filtrarHistorial('todos')" class="filter-btn active text-[9px] font-bold px-3 py-1.5 rounded-full border border-cyan-500/50 bg-cyan-500/10 text-cyan-400 whitespace-nowrap">TODOS</button>
                <button onclick="filtrarHistorial('Robo')" class="filter-btn text-[9px] font-bold px-3 py-1.5 rounded-full border border-slate-700 bg-slate-900 text-slate-500 whitespace-nowrap">ROBOS</button>
                <button onclick="filtrarHistorial('Accidente')" class="filter-btn text-[9px] font-bold px-3 py-1.5 rounded-full border border-slate-700 bg-slate-900 text-slate-500 whitespace-nowrap">VIALES</button>
            </div>

            <div id="incident-feed" class="flex-1 p-6 overflow-y-auto space-y-4"></div>
        </aside>

        <section class="flex-1 relative">
            <div id="map"></div>
            <button onclick="miUbicacion()" class="absolute bottom-10 right-10 z-50 bg-slate-900 border border-slate-700 p-4 rounded-full text-cyan-400 hover:bg-cyan-600 hover:text-white transition-all shadow-2xl group">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                <span class="absolute right-16 top-1/2 -translate-y-1/2 bg-slate-900 text-[10px] px-2 py-1 rounded border border-slate-700 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap tracking-widest font-black">LOCALIZAR MI POSICIÓN</span>
            </button>
        </section>
    </main>

    <div id="toast-container" class="fixed bottom-6 left-6 z-[100] space-y-3"></div>

    <script>
        const API_BACKEND = 'https://basically-hangup-pastel.ngrok-free.dev/alerts';
        let map, infoWindow, markers = [], todasLasAlertas = [];

        const darkStyle = [
            { "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] },
            { "elementType": "labels.text.fill", "stylers": [{ "color": "#94a3b8" }] },
            { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#334155" }] },
            { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#020617" }] }
        ];

        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString();
        }, 1000);

        function showToast(mensaje, tipo = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `glass-panel border-l-4 ${tipo === 'success' ? 'border-cyan-500 text-cyan-400' : 'border-red-500 text-red-400'} p-4 rounded-xl shadow-2xl transition-all duration-500 -translate-x-full opacity-0 text-[10px] font-black uppercase tracking-widest flex items-center gap-3`;
            toast.innerHTML = `<div class="h-2 w-2 rounded-full ${tipo === 'success' ? 'bg-cyan-500' : 'bg-red-500'} animate-ping"></div>${mensaje}`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('-translate-x-full', 'opacity-0'), 100);
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-x-full');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        async function initMap() {
            const { Map, InfoWindow } = await google.maps.importLibrary("maps");
            infoWindow = new InfoWindow();
            map = new Map(document.getElementById("map"), {
                center: { lat: 20.6644, lng: -103.3248 },
                zoom: 14,
                styles: darkStyle,
                mapId: "DEMO_MAP_ID",
                mapTypeControl: false,
                streetViewControl: false
            });
            cargarHistorial();
        }

        function miUbicacion() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
                    map.setZoom(17);
                    map.panTo(pos);
                    showToast("GPS: POSICIÓN LOCALIZADA");
                }, () => showToast("Error: GPS Desactivado", "error"));
            }
        }

        function filtrarHistorial(tipo) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn text-[9px] font-bold px-3 py-1.5 rounded-full border border-slate-700 bg-slate-900 text-slate-500 whitespace-nowrap";
            });
            event.target.className = "filter-btn active text-[9px] font-bold px-3 py-1.5 rounded-full border border-cyan-500/50 bg-cyan-500/10 text-cyan-400 whitespace-nowrap";
            
            const filtradas = tipo === 'todos' ? todasLasAlertas : todasLasAlertas.filter(a => a.tipo === tipo);
            renderizarFeed(filtradas);
        }

        function actualizarStats(alertas) {
            document.getElementById('stat-total').innerText = alertas.length.toString().padStart(2, '0');
            if(alertas.length > 0) {
                const counts = alertas.reduce((acc, a) => { acc[a.tipo] = (acc[a.tipo] || 0) + 1; return acc; }, {});
                const common = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, "--");
                document.getElementById('stat-common').innerText = common.toUpperCase();
            }
        }

        async function cargarHistorial() {
            const feed = document.getElementById('incident-feed');
            feed.innerHTML = [1,2,3].map(() => `<div class="skeleton h-24 w-full rounded-xl mb-4 border border-slate-800/50"></div>`).join('');

            try {
                const res = await fetch(API_BACKEND, {
                    headers: { "ngrok-skip-browser-warning": "true" }
                });
                todasLasAlertas = await res.json();
                actualizarStats(todasLasAlertas);
                renderizarFeed(todasLasAlertas);
            } catch (e) { showToast("ERROR DE CONEXIÓN", "error"); }
        }

        async function renderizarFeed(alertas) {
            const feed = document.getElementById('incident-feed');
            feed.innerHTML = "";
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
            
            markers.forEach(m => m.map = null);
            markers = [];

            alertas.forEach(a => {
                const marker = new AdvancedMarkerElement({
                    map: map,
                    position: { lat: parseFloat(a.lat), lng: parseFloat(a.lon) },
                    title: a.tipo
                });
                markers.push(marker);

                marker.addListener("gmp-click", () => {
                    infoWindow.setContent(`<div class="p-2 text-slate-800 text-[10px] font-bold uppercase">${a.tipo}<br>${a.ubicacion}</div>`);
                    infoWindow.open(map, marker);
                });

                const item = document.createElement('div');
                item.className = "group bg-slate-900/40 border-l-4 border-cyan-500/30 p-4 rounded-r-xl transition-all duration-300 hover:bg-slate-800 hover:border-cyan-400 hover:translate-x-2 cursor-pointer border border-slate-800/50";
                item.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black text-cyan-400 uppercase group-hover:text-cyan-300">${a.tipo}</span>
                        <span class="text-[9px] font-mono text-slate-600">${a.fecha || ''}</span>
                    </div>
                    <p class="text-[11px] text-slate-400 group-hover:text-slate-200 leading-tight">${a.ubicacion}</p>
                `;
                item.onclick = () => map.panTo({ lat: parseFloat(a.lat), lng: parseFloat(a.lon) });
                feed.appendChild(item);
            });
        }

        async function enviarAlerta() {
            const tipo = document.getElementById('tipo').value;
            const ubicacion = document.getElementById('ubicacion').value;
            if (!ubicacion) return showToast("DATO REQUERIDO", "error");

            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ address: ubicacion + ", Guadalajara" }, async (results, status) => {
                if (status === "OK") {
                    const lat = results[0].geometry.location.lat();
                    const lon = results[0].geometry.location.lng();
                    try {
                        const response = await fetch(API_BACKEND, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer token-safecity',
                                'ngrok-skip-browser-warning': 'true'
                            },
                            body: JSON.stringify({ tipo, ubicacion, lat, lon })
                        });
                        if (response.ok) {
                            showToast("TRANSMISIÓN EXITOSA");
                            document.getElementById('ubicacion').value = "";
                            cargarHistorial();
                        }
                    } catch (e) { showToast("ERROR_SERVER", "error"); }
                } else showToast("UBICACIÓN INVÁLIDA", "error");
            });
        }
    </script>
    <script>
        const MAPS_CONFIG = { key: "AIzaSyCIEFQof0In0Gh8nT60zZt6p2jBrM1fHOs" };
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_CONFIG.key}&callback=initMap&libraries=marker,geocoding`;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
    </script>
</body>
</html>
